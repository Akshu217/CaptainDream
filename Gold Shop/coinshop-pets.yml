  'piggy':
    material: PIG_SPAWN_EGG
    slot: 10
    priority: 1
    display_name: "&#41ACFF&lPiggy"
    lore:
      - "&8Coinshop Item"
      - ""
      - "&6◈ &fCost: &61,000 Coins"
      - ""
      - "&a&l➥ CLICK TO PURCHASE"
      - ""

    click_commands:
      - '[givepermission] ultracosmetics.pets.piggy'
      - '[console] points take %player_name% 1000'

      - '[message] &8&l[&a&l!&8&l] &#7AFE77You successfully bought the &fPiggy &#7AFE77Pet!'
      - '[close]'

    click_requirement:
      requirements:
        check_balance:
          type: '>='
          input: '%playerpoints_points%'
          output: '1000'
          deny_commands:
            - "[message] &8&l[&c&l!&8&l] &#FF7C7CYou don't have enough coins to purchase this item!"
            - "[message] &8&l[&c&l!&8&l] &#FF7C7CYou need &f1,000 &#FF7C7Cbut you only have &f%playerpoints_points_formatted%&#FF7C7C."
